<div class="app-container" [attr.data-theme]="themeService.currentTheme">
  <header class="app-header">
    <a class="brand" routerLink="/code-comparator" title="Open StackMate workspace">
      <div class="brand-mark">
        <svg class="brand-logo" viewBox="0 0 64 64" aria-hidden="true">
          <rect width="64" height="64" rx="12" fill="#0F172A" />
          <rect x="14" y="30" width="26" height="12" rx="3" fill="#1E293B" />
          <rect x="18" y="24" width="26" height="12" rx="3" fill="#334155" />
          <rect x="22" y="18" width="26" height="12" rx="3" fill="#38BDF8" />
          <text x="24" y="28" font-size="10" fill="#0F172A" font-family="monospace">&gt;</text>
        </svg>
      </div>
      <div class="brand-copy">
        <h1>{{ title }}</h1>
        <p>{{ subtitle }}</p>
      </div>
    </a>

    <div class="header-actions">
      <button
        class="header-btn theme-toggle"
        type="button"
        (click)="toggleTheme()"
        [title]="'Switch to ' + (themeService.currentTheme === 'dark' ? 'light' : 'dark') + ' theme'">
        <span class="header-btn-icon">{{ themeService.currentTheme === 'dark' ? '☀' : '☾' }}</span>
        <span>{{ themeService.currentTheme === 'dark' ? 'Light' : 'Dark' }}</span>
      </button>

      <!-- <a class="header-btn" [href]="githubUrl" target="_blank" rel="noreferrer" title="Open GitHub">
        <span class="header-btn-icon">⌘</span>
        <span>GitHub</span>
      </a> -->

      <!-- <button class="profile-pill" type="button" title="StackMate profile">
        <span class="profile-avatar">SM</span>
        <span class="profile-meta">
          <strong>Workspace</strong>
          <small>Developer Mode</small>
        </span>
      </button> -->
    </div>
  </header>

  <div class="main-content">
    <nav class="sidebar">
      <div class="sidebar-head">
        <div class="nav-title">Workspace</div>
        <div class="nav-caption">Fast access to every developer utility.</div>
      </div>

      <a
        *ngFor="let item of navItems"
        [routerLink]="item.route"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav-link">
        <span class="nav-icon">{{ item.icon }}</span>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    </nav>

    <section class="content">
      <router-outlet></router-outlet>
    </section>
  </div>
</div>
