<div class="change-password-container">
  <div class="card">
    <div class="card-header">
      <h2>Change Password</h2>
      <p class="subtitle">Update your account password</p>
    </div>

    <div class="card-content">
      <form [formGroup]="passwordForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="currentPassword">Current Password</label>
          <div class="password-input">
            <input 
              [type]="hideCurrentPassword ? 'password' : 'text'" 
              id="currentPassword" 
              formControlName="currentPassword"
              class="form-control"
              placeholder="Enter your current password"
            >
            <button 
              type="button" 
              class="toggle-visibility" 
              (click)="hideCurrentPassword = !hideCurrentPassword"
            >
              <span>{{ hideCurrentPassword ? '👁️' : '👁️‍🗨️' }}</span>
            </button>
          </div>
          <div class="error-message" *ngIf="passwordForm.get('currentPassword')?.invalid && passwordForm.get('currentPassword')?.touched">
            Current password is required
          </div>
        </div>

        <div class="form-group">
          <label for="newPassword">New Password</label>
          <div class="password-input">
            <input 
              [type]="hideNewPassword ? 'password' : 'text'" 
              id="newPassword" 
              formControlName="newPassword"
              class="form-control"
              placeholder="Enter your new password"
            >
            <button 
              type="button" 
              class="toggle-visibility" 
              (click)="hideNewPassword = !hideNewPassword"
            >
              <span>{{ hideNewPassword ? '👁️' : '👁️‍🗨️' }}</span>
            </button>
          </div>
          <div class="error-message" *ngIf="passwordForm.get('newPassword')?.errors?.required && passwordForm.get('newPassword')?.touched">
            New password is required
          </div>
          <div class="error-message" *ngIf="passwordForm.get('newPassword')?.errors?.minlength && passwordForm.get('newPassword')?.touched">
            Password must be at least 8 characters
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm New Password</label>
          <div class="password-input">
            <input 
              [type]="hideConfirmPassword ? 'password' : 'text'" 
              id="confirmPassword" 
              formControlName="confirmPassword"
              class="form-control"
              placeholder="Confirm your new password"
            >
            <button 
              type="button" 
              class="toggle-visibility" 
              (click)="hideConfirmPassword = !hideConfirmPassword"
            >
              <span>{{ hideConfirmPassword ? '👁️' : '👁️‍🗨️' }}</span>
            </button>
          </div>
          <div class="error-message" *ngIf="passwordForm.get('confirmPassword')?.errors?.required && passwordForm.get('confirmPassword')?.touched">
            Please confirm your new password
          </div>
          <div class="error-message" *ngIf="passwordForm.errors?.mismatch && passwordForm.get('confirmPassword')?.touched">
            Passwords do not match
          </div>
        </div>

        <div class="message-container">
          <div class="error-message" *ngIf="errorMessage">{{ errorMessage }}</div>
          <div class="success-message" *ngIf="successMessage">{{ successMessage }}</div>
        </div>

        <div class="button-container">
          <button type="button" class="cancel-button" routerLink="/">Cancel</button>
          <button 
            type="submit" 
            class="submit-button" 
            [disabled]="passwordForm.invalid || isLoading"
          >
            <span *ngIf="!isLoading">Update Password</span>
            <span *ngIf="isLoading" class="loading-spinner">⏳</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
